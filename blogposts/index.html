<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>segfault · blog</title>
  <link rel="stylesheet" href="../xp.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --bg2: #161616; --border: rgba(255,255,255,0.08);
      --text: #e8e8e8; --muted: #888; --hint: #555; --green: #1D9E75;
      --green-bg: #0a2e22; --green-text: #5DCAA5;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; min-height: 100vh; }
    .page { max-width: 680px; margin: 0 auto; padding: 3rem 2rem 5rem; }
    a.back { font-size: 12px; color: var(--hint); margin-bottom: 2.5rem; display: inline-block; text-decoration: none; }
    a.back:hover { color: var(--green); }
    a.back::before { content: '← '; }
    .header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2.5rem; }
    .page-title { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
    .new-link { font-size: 12px; color: var(--hint); text-decoration: none; }
    .new-link:hover { color: var(--green); }

    .post-list { display: flex; flex-direction: column; }
    .post-item {
      display: grid; grid-template-columns: 90px 1fr; gap: 20px;
      padding: 18px 0; border-bottom: 0.5px solid var(--border);
      text-decoration: none; align-items: start;
    }
    .post-item:last-child { border-bottom: none; }
    .post-item:hover .post-title { color: var(--green); }
    .post-date { font-size: 11px; color: var(--hint); padding-top: 4px; white-space: nowrap; }
    .post-title { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.4; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: color 0.15s; }
    .post-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .post-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 10px; color: var(--green-text); background: var(--green-bg); border-radius: 5px; padding: 2px 8px; font-family: 'Courier New', monospace; }

    .empty { font-size: 13px; color: var(--hint); padding: 3rem 0; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-tag { font-size: 11px; color: var(--hint); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 5px; padding: 3px 10px; cursor: pointer; font-family: 'Courier New', monospace; }
    .filter-tag.active { color: var(--green-text); background: var(--green-bg); border-color: transparent; }
  </style>
</head>
<body>

<div id="xp-page-content" style="display:none;">
<div class="page">
  <a class="back" href="../index.html">therealsegfault</a>
  <div class="header-row">
    <div class="page-title">blog</div>
    <a class="new-link" href="editor.html">new post →</a>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="post-list" id="post-list"><div class="empty">loading...</div></div>
</div>

<script>
const OWNER = 'therealsegfault', REPO = 'my-page';
const INDEX_API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/blogposts/index.json`;
let allPosts = [], activeTag = null;

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'});
}

async function load() {
  try {
    const r = await fetch(INDEX_API, { headers: { 'Accept': 'application/vnd.github+json' } });
    const meta = await r.json();
    allPosts = JSON.parse(atob(meta.content.replace(/\n/g,'')));
    renderFilters();
    renderPosts();
  } catch(e) {
    document.getElementById('post-list').innerHTML = '<div class="empty">no posts yet</div>';
  }
}

function renderFilters() {
  const allTags = [...new Set(allPosts.flatMap(p => p.tags || []))];
  if (!allTags.length) return;
  const row = document.getElementById('filter-row');
  row.innerHTML = allTags.map(t =>
    `<span class="filter-tag ${activeTag===t?'active':''}" onclick="filterTag('${t}')">${t}</span>`
  ).join('');
}

function filterTag(t) {
  activeTag = activeTag === t ? null : t;
  renderFilters();
  renderPosts();
}

function renderPosts() {
  const posts = activeTag ? allPosts.filter(p => (p.tags||[]).includes(activeTag)) : allPosts;
  const el = document.getElementById('post-list');
  if (!posts.length) { el.innerHTML = '<div class="empty">no posts yet</div>'; return; }
  el.innerHTML = posts.map(p => `
    <a class="post-item" href="post.html?f=${encodeURIComponent(p.file)}">
      <div class="post-date">${fmtDate(p.date)}</div>
      <div>
        <div class="post-title">${p.title}</div>
        ${p.subtitle ? `<div class="post-subtitle">${p.subtitle}</div>` : ''}
        ${p.tags?.length ? `<div class="post-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
      </div>
    </a>
  `).join('');
}

load();
</script>
</div>

<script src="../xp-shell.js"></script>
<script>xpInject({ title: 'blog — therealsegfault', icon: 'blog' });</script>
</body>
</html>
