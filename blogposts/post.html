<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>post · segfault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --bg2: #161616; --border: rgba(255,255,255,0.08);
      --text: #e8e8e8; --muted: #888; --hint: #555; --green: #1D9E75;
      --green-bg: #0a2e22; --green-text: #5DCAA5; --code-bg: #1a1a1a;
    }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .page { max-width: 680px; margin: 0 auto; padding: 3rem 2rem 6rem; }
    a.back { font-size: 12px; color: var(--hint); margin-bottom: 2.5rem; display: inline-block; text-decoration: none; font-family: 'Courier New', monospace; }
    a.back:hover { color: var(--green); }
    a.back::before { content: '← '; }

    .post-meta { margin-bottom: 2.5rem; }
    .post-title { font-size: 30px; font-weight: 700; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 10px; }
    .post-subtitle { font-size: 18px; color: var(--muted); font-weight: 400; margin-bottom: 16px; line-height: 1.45; }
    .post-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .post-date { font-size: 12px; color: var(--hint); font-family: 'Courier New', monospace; }
    .tag { font-size: 10px; color: var(--green-text); background: var(--green-bg); border-radius: 5px; padding: 2px 8px; font-family: 'Courier New', monospace; }

    .post-body { font-size: 16px; line-height: 1.8; color: var(--muted); }
    .post-body h1, .post-body h2, .post-body h3 { color: var(--text); font-weight: 600; margin: 2rem 0 0.75rem; line-height: 1.3; }
    .post-body h1 { font-size: 24px; }
    .post-body h2 { font-size: 20px; }
    .post-body h3 { font-size: 17px; }
    .post-body p { margin-bottom: 1.25rem; }
    .post-body a { color: var(--green); text-decoration: none; }
    .post-body a:hover { text-decoration: underline; }
    .post-body code { font-family: 'Courier New', monospace; font-size: 13px; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; color: var(--green-text); }
    .post-body pre { background: var(--code-bg); border-radius: 8px; padding: 1.25rem; margin: 1.5rem 0; overflow-x: auto; }
    .post-body pre code { background: none; padding: 0; font-size: 13px; color: #c8c8c8; }
    .post-body blockquote { border-left: 2px solid var(--green); padding-left: 1rem; margin: 1.5rem 0; color: var(--hint); font-style: italic; }
    .post-body hr { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }
    .post-body ul, .post-body ol { padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .post-body li { margin-bottom: 4px; }
    .post-body img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
    .post-body strong { color: var(--text); font-weight: 600; }

    .loading { font-size: 13px; color: var(--hint); padding: 3rem 0; font-family: 'Courier New', monospace; }
    .error   { font-size: 13px; color: #E24B4A; padding: 1rem 0; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
<div class="page">
  <a class="back" href="index.html">blog</a>
  <div id="content"><div class="loading">loading post...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const OWNER = 'therealsegfault', REPO = 'my-page';
const params = new URLSearchParams(location.search);
const file = params.get('f');

function parseFrontmatter(raw) {
  const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: raw };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const [k, ...v] = line.split(': ');
    let val = v.join(': ').trim();
    if (val.startsWith('[')) {
      try { meta[k] = JSON.parse(val); } catch(e) { meta[k] = val; }
    } else {
      meta[k] = val.replace(/^"|"$/g, '');
    }
  });
  return { meta, body: match[2] };
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString([], {month:'long', day:'numeric', year:'numeric'});
}

async function load() {
  if (!file) { document.getElementById('content').innerHTML = '<div class="error">no post specified</div>'; return; }
  try {
    const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${file}`, { headers: { 'Accept': 'application/vnd.github+json' } });
    const data = await r.json();
    const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    const { meta, body } = parseFrontmatter(raw);

    document.title = (meta.title || 'post') + ' · segfault';
    const tags = Array.isArray(meta.tags) ? meta.tags : [];

    document.getElementById('content').innerHTML = `
      <div class="post-meta">
        <h1 class="post-title">${meta.title || ''}</h1>
        ${meta.subtitle ? `<div class="post-subtitle">${meta.subtitle}</div>` : ''}
        <div class="post-info">
          ${meta.date ? `<span class="post-date">${fmtDate(meta.date)}</span>` : ''}
          ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="post-body">${marked.parse(body)}</div>
    `;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">could not load post</div>';
  }
}

load();
</script>
</body>
</html>
