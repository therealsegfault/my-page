<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · segfault</title>
  <link rel="stylesheet" href="xp.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0e0e0e;
      color: #e8e8e8;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap { padding: 2rem; }
    .path { font-size: 13px; color: #555; margin-bottom: 1.5rem; }
    .code { font-size: 72px; font-weight: 600; color: #e8e8e8; letter-spacing: -0.04em; line-height: 1; margin-bottom: 1rem; }
    .msg  { font-size: 15px; color: #888; margin-bottom: 2rem; }
    .home {
      font-size: 13px; color: #555; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.15s;
    }
    .home:hover { color: #1D9E75; }
    .home::before { content: '← '; }
    .cursor {
      display: inline-block; width: 2px; height: 14px;
      background: #1D9E75; margin-left: 2px; vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
  </style>
</head>
<body>

<div id="xp-page-content" style="display:none;">
<div class="wrap">
    <div class="path">/dev/null/<span id="slug"></span><span class="cursor"></span></div>
    <div class="code">404</div>
    <div class="msg">that page doesn't exist here.</div>
    <a class="home" href="/my-page/">return to /home</a>
  </div>
  <script>
    const slug = location.pathname.split('/').filter(Boolean).pop() || '';
    document.getElementById('slug').textContent = slug;
  </script>
</div>

<script src="xp-shell.js"></script>
<script>xpInject({ title: '404 — therealsegfault', icon: 'page' });</script>
</body>
</html>
